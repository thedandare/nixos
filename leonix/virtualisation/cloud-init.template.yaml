  list:
    - root:Senha171
  expire: false

write_files:
  - path: /etc/tailscale_auth.env
    content: |
        TS_AUTH_KEY=INJECT_CLIENT_SECRET
        TS_ID=INJECT_CLIENT_ID

  - path: /etc/sysctl.d/99-kubernetes.conf
    permissions: '0644'
    content: |
      net.ipv4.ip_forward = 1
      fs.inotify.max_user_instances = 512
      fs.inotify.max_user_watches = 524288
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1

  # 🤝 INJEÇÃO AUTOMÁTICA: O script irmão que consulta o seu servidor socat na porta 88
  - path: /usr/local/bin/microceph_cluster_join.sh
    permissions: '0700'
    owner: root:root
    encoding: b64
    content: INJECT_MICROCEPH_B64_HERE

  # 🔑 SCRIPT DO TAILSCALE INJETADO EM BASE64 PELO SEU PIPELINE
  - path: /usr/local/bin/autoconnect-tailscale.sh
    permissions: '0755'
    encoding: b64
    content: INJECT_TAILSCALE_B64_HERE

  # 🖥️ DECLARATIVO: Cria o arquivo de sessão do XFCE diretamente para o Root
  - path: /root/.xsession
    permissions: '0744'
    owner: root:root
    content: |
      xfce4-session

  # ⚙️ DECLARATIVO: Força o Xorg a aceitar conexões sem console físico (evita telas pretas)
  - path: /etc/X11/Xwrapper.config
    permissions: '0644'
    owner: root:root
    content: |
      allowed_users=anybody

  # 🖥️ SCRIPT DE INICIALIZAÇÃO DO VNC (Garante Openbox + Clipboard ativo)
  - path: /root/.vnc/xstartup
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/sh
      # Sincroniza o Clipboard (Copiar) do Host para o VNC
      autocutsel -s CLIPBOARD -fork
      # Sincroniza a Seleção (Recortar) do Host para o VNC
      autocutsel -s PRIMARY -fork
      # Inicia o gerenciador de janelas ultra-leve
      exec xfce4-session

runcmd:
  # 1. Atualiza os repositórios
  - apt-get update

  # 2. Instala APENAS o snapd primeiro (sem a interface gráfica pesada)
  - apt-get install -y snapd

  # 3. Agora que ele existe, limpa qualquer trava que o Ubuntu tenha colocado
  - systemctl unmask snapd.service snapd.socket || true
  - systemctl enable snapd.service snapd.socket || true
  - systemctl start snapd.service snapd.socket || true

  # 4. Agora sim, instala a interface gráfica e o VNC com segurança
  - apt-get install -y util-linux jq curl iptables  net-tools tigervnc-standalone-server openbox autocutsel xfce4 xfce4-goodies

  # 🛠️ FIX COMPATIBILIDADE NIXOS: Força o uso do NFTables moderno (ALINHADO)
  # - update-alternatives --set iptables /usr/sbin/iptables-nft || true
  # - update-alternatives --set ip6tables /usr/sbin/ip6tables-nft || true
  # - update-alternatives --set arptables /usr/sbin/arptables-nft || true
  # - update-alternatives --set ebtables /usr/sbin/ebtables-nft || true

  # 2º Passo: Define a senha do VNC de forma automatizada (CORRIGIDO SEM ECHO)
  - mkdir -p /root/.vnc
  - printf "Senha171\nSenha171\n" | vncpasswd -f > /root/.vnc/passwd
  - chmod 0600 /root/.vnc/passwd
  - echo "localhost=no" > /root/.vnc/config

  # 3º Passo: Inicia os servidores VNC locais
  - vncserver :1 -geometry 1280x720 -rfbauth /root/.vnc/passwd
  - sleep 2
  - vncserver :2 -geometry 1280x720 -rfbauth /root/.vnc/passwd

  # 4º Passo: Inicia o VNC Reverso em background direcionado ao Host
  - sleep 2
  - vncconfig -display :2 -connect 192.168.0.10:5500 &

  # 5. Instalação do Tailscale e execução do script de pareamento (ALINHADO)
  - curl -fsSL https://tailscale.com/install.sh | sh
  - sleep 2
  - /usr/local/bin/autoconnect-tailscale.sh
  - socat /dev/null TCP:192.168.0.10:1234

  # 6. Instalação estável do MicroK8s e MicroCeph
  - snap install microk8s --channel=1.36/stable --classic
  - snap install microceph --channel=latest/stable
  - snap refresh --hold microk8s microceph

  # 7. Correções de Cgroup, QoS (Fix de Crash no LXD) e CNI
  - sed -i 's/snapshotter = "${SNAPSHOTTER}"/snapshotter = "overlayfs"/g' /var/snap/microk8s/current/args/containerd-template.toml
  - grep -qxF -- '--protect-kernel-defaults=false' /var/snap/microk8s/current/args/kubelet || echo '--protect-kernel-defaults=false' >> /var/snap/microk8s/current/args/kubelet
  - grep -qxF -- '--enforce-node-allocatable=""' /var/snap/microk8s/current/args/kubelet || echo '--enforce-node-allocatable=""' >> /var/snap/microk8s/current/args/kubelet

  - mkdir -p /var/snap/microk8s/current/args/cni-network
  - grep -qxF -- '--cni-conf-dir=/var/snap/microk8s/current/args/cni-network' /var/snap/microk8s/current/args/kubelet || echo '--cni-conf-dir=/var/snap/microk8s/current/args/cni-network' >> /var/snap/microk8s/current/args/kubelet

  - sed -i '/^--proxy-mode=/d' /var/snap/microk8s/current/args/kube-proxy
  - echo '--proxy-mode=nftables' >> /var/snap/microk8s/current/args/kube-proxy
  # 🛠️ FIX DO KINE: Eleva limites de arquivos abertos (Evita erro gRPC Closed Connection no SQLite)
  - prlimit --pid=$$ --nofile=1048576:1048576 || true
  - mkdir -p /etc/systemd/system/snap.microk8s.daemon-kubelite.service.d
  - |
    cat <<EOF > /etc/systemd/system/snap.microk8s.daemon-kubelite.service.d/override.conf
    [Service]
    LimitNOFILE=1048576
    LimitNPROC=512000
    EOF
  - systemctl daemon-reload
  - rm -f /var/snap/microk8s/current/var/kubernetes/backend/kine.sock
  - chmod -R 777 /var/snap/microk8s/current/var/kubernetes/backend/

  # 8. Atualiza rede do Host e segura atualizações automáticas do snap
  - sysctl --system
  - ln -sf /run/systemd/resolve/resolv.conf /etc/resolv.conf || true
  - snap set system refresh.hold=forever

  # 9. Aplica os parâmetros reiniciando os daemons do MicroK8s
  - snap restart microk8s
  - microk8s status --wait-ready


