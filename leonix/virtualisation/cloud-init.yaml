write_files:
  - path: /etc/sysctl.d/99-kubernetes.conf
    permissions: '0644'
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 0
      net.bridge.bridge-nf-call-ip6tables = 0

runcmd:
  # 1. Instalação do snapd e ferramentas básicas
  - apt-get update
  - apt-get install -y snapd jq curl iptables

  # 🛠️ FIX COMPATIBILIDADE NIXOS: Força o uso do NFTables moderno (Kernel NixOS não tem iptables antigo)
  - update-alternatives --set iptables /usr/sbin/iptables-nft || true
  - update-alternatives --set ip6tables /usr/sbin/ip6tables-nft || true
  - update-alternatives --set arptables /usr/sbin/arptables-nft || true
  - update-alternatives --set ebtables /usr/sbin/ebtables-nft || true

  # 2. Inicialização forçada do Snapd
  - systemctl unmask snapd.service snapd.socket
  - systemctl enable snapd.service snapd.socket
  - systemctl start snapd.service snapd.socket

  # 3. Aguarda o Socket do Snapd responder
  - |
    for i in {1..15}; do
      if snap version >/dev/null 2>&1; then
        echo "Snapd respondendo com sucesso!"
        break
      fi
      echo "Aguardando inicialização do socket do snapd (Tentativa $i/15)..."
      systemctl start snapd.socket
      sleep 2
    done

  # 4. Instalação da base e do MicroK8s 1.36
  - snap install core
  - snap wait system seed.loaded
  - snap install microk8s --channel=1.36/stable --classic

  # 5. Correções de Cgroup, QoS (Fix de Crash no LXD) e CNI antes de restartar
  - sed -i 's/snapshotter = "${SNAPSHOTTER}"/snapshotter = "overlayfs"/g' /var/snap/microk8s/current/args/containerd-template.toml
  # - grep -qxF '--cgroup-driver=systemd' /var/snap/microk8s/current/args/kubelet || echo '--cgroup-driver=systemd' >> /var/snap/microk8s/current/args/kubelet
  # - grep -qxF '--cni-conf-dir=/var/snap/microk8s/current/args/cni-network' /var/snap/microk8s/current/args/kubelet || echo '--cni-conf-dir=/var/snap/microk8s/current/args/cni-network' >> /var/snap/microk8s/current/args/kubelet
  # - grep -qxF '--cgroups-per-qos=false' /var/snap/microk8s/current/args/kubelet || echo '--cgroups-per-qos=false' >> /var/snap/microk8s/current/args/kubelet
  # - grep -qxF '--enforce-node-allocatable=""' /var/snap/microk8s/current/args/kubelet || echo '--enforce-node-allocatable=""' >> /var/snap/microk8s/current/args/kubelet

   # Garante as injeções de flags no arquivo correto da revisão ativa
  - grep -qxF '--cgroup-driver=systemd' ${SNAP_DATA}/args/kubelet || echo '--cgroup-driver=systemd' >> ${SNAP_DATA}/args/kubelet
  - grep -qxF '--cni-conf-dir=${SNAP_DATA}/args/cni-network' ${SNAP_DATA}/args/kubelet || echo '--cni-conf-dir=${SNAP_DATA}/args/cni-network' >> ${SNAP_DATA}/args/kubelet
  - grep -qxF '--cgroups-per-qos=false' ${SNAP_DATA}/args/kubelet || echo '--cgroups-per-qos=false' >> ${SNAP_DATA}/args/kubelet
  # =========================================================================
  # 🛡️ FIX DEFINITIVO DO NFTABLES (Para o kube-proxy rodar no NixOS)
  # =========================================================================
  # Força o componente de proxy da Canonical a parar de caçar iptables antigos e rodar em nftables puro
  - grep -qxF '--proxy-mode=nftables' ${SNAP_DATA}/args/kube-proxy || echo '--proxy-mode=nftables' >> ${SNAP_DATA}/args/kube-proxy
  # =========================================================================

  # =========================================================================
  # 🧬 CORREÇÃO REAL: ATIVAÇÃO DO MODO IPVS NO PROXY (Mata o i/o timeout)
  # =========================================================================
  # Altera a flag do proxy para rodar em modo IPVS estável compatível com o Kernel 7
  - sed -i 's/--proxy-mode=.*/--proxy-mode=ipvs/g' ${SNAP_DATA}/args/kube-proxy
  # Caso o arquivo esteja vazio ou sem a flag, injeta ela limpa
  - grep -qxF '--proxy-mode=ipvs' ${SNAP_DATA}/args/kube-proxy || echo '--proxy-mode=ipvs' >> ${SNAP_DATA}/args/kube-proxy



  # 🛠️ FIX DO KINE: Eleva limites de arquivos abertos (Evita erro gRPC Closed Connection no SQLite)
  - prlimit --pid=$$ --nofile=1048576:1048576 || true
  - mkdir -p /etc/systemd/system/snap.microk8s.daemon-kubelite.service.d
  - |
    cat <<EOF > /etc/systemd/system/snap.microk8s.daemon-kubelite.service.d/override.conf
    [Service]
    LimitNOFILE=1048576
    LimitNPROC=512000
    EOF
  - systemctl daemon-reload
  - rm -f /var/snap/microk8s/current/var/kubernetes/backend/kine.sock
  - chmod -R 777 /var/snap/microk8s/current/var/kubernetes/backend/

  # 6. Atualiza rede do Host e segura atualizações automáticas do snap
  - sysctl --system
  - ln -sf /run/systemd/resolve/resolv.conf /etc/resolv.conf || true
  - snap set system refresh.hold=forever

  # 7. Aplica os parâmetros reiniciando os daemons do MicroK8s
  - snap restart microk8s.daemon-containerd
  - snap restart microk8s.daemon-kubelite

  # 8. Instalação do Tailscale via script oficial
  - curl -fsSL https://tailscale.com/install.sh | sh

  # 🛠️ FIX DO TAILSCALE: Correção das URLs e chamadas de API OAuth v2 Oficial do Tailscale
  - |
    export API_TOKEN=$(curl -s -u "kxixTezVgB21CNTRL:tskey-client-kxixTezVgB21CNTRL-jiN4D8nU7sbYCg1vcCtWrb1nA2D4gRCa" -d "grant_type=client_credentials" "https://tailscale.com" | jq -r .access_token)
    export REQ_KEY=$(curl -s -X POST -H "Authorization: Bearer $API_TOKEN" -H "Content-Type: application/json" -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true,"tags":["tag:teste","tag:canssh"]}}},"expirySeconds":60}' "https://tailscale.com" | jq -r .key)
    tailscale up --auth-key=$REQ_KEY --accept-dns=true --ssh=true --stateful-filtering=false

  # 9. Configuração de Funnel / Exposição de portas em Background
  - sleep 5
  - tailscale set --webclient=true
  - tailscale funnel --bg --tcp 80 5252
  - tailscale funnel --bg --tcp 2409 22
